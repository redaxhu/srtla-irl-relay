srt {
    worker_threads  1;
    worker_connections 300;
    http_port 8181;
    cors_header *;

    server {
        listen_player 30000;
	listen_publisher 4001;          # sima SRT publisher (OBS, FFmpeg)
        listen_publisher_srtla 5002;

        domain_player play;
        domain_publisher publish;
        default_sid publish/live/feed1;
        backlog 100;
        idle_streams_timeout -1;

        app {
            app_player live;
            app_publisher live;
        }
    }
}
